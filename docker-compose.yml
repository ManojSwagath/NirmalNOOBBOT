# ============================================================
#  MoodBot — Docker Compose
#  Handles camera, microphone, display, and speaker passthrough.
#  Works with both PulseAudio and PipeWire (Linux Mint, Ubuntu, Pi OS).
#
#  Linux/Pi:   docker-compose up
#  Windows:    see run-docker.bat (uses Docker Desktop + VcXsrv)
# ============================================================

services:
  moodbot:
    build: .
    image: moodbot:latest
    container_name: moodbot

    # Pass .env file for GROQ_API_KEY
    env_file:
      - .env

    # X11 display + audio
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/root/.Xauthority
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
      - CAMERA_INDEX=0
      # Suppress noisy ALSA debug messages
      - LIBASOUND_DEBUG=none
      - SDL_AUDIODRIVER=pulseaudio

    volumes:
      # X11 socket for GUI window
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # X11 auth cookie
      - ${XAUTHORITY:-~/.Xauthority}:/root/.Xauthority:ro
      # PulseAudio / PipeWire-Pulse socket for speaker + mic
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:rw
      # PipeWire socket (Pi OS Bookworm uses PipeWire by default)
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pipewire-0:${XDG_RUNTIME_DIR:-/run/user/1000}/pipewire-0:rw
      # ALSA sound devices (fallback if PulseAudio unavailable)
      - /dev/snd:/dev/snd
      # Persist emotion memory across container restarts
      - ./data:/app/data

    # Full device access (camera, mic, speaker)
    privileged: true
    network_mode: host
